# Tiny Tapeout project information
project:
  title:        "Hex to 7-segment Decoder"
  author:       "Your Name"              # Change this to your name
  discord:      "" 
  description:  "Converts a 4-bit hex input to 7-segment display outputs."
  language:     "Verilog"
  clock_hz:     0                        # Combinational logic, so 0 is fine

  tiles: "1x1"

  # Ensure this matches the module name in your project.v
  top_module:  "tt_um_hex_decoder"

  source_files:
    - "project.v"

pinout:
  # Inputs (ui[3:0] map to d3,d2,d1,d0)
  ui[0]: "d0"
  ui[1]: "d1"
  ui[2]: "d2"
  ui[3]: "d3"
  ui[4]: "unused"
  ui[5]: "unused"
  ui[6]: "unused"
  ui[7]: "unused"

  # Outputs (uo[6:0] map to segments A-G)
  uo[0]: "seg_a"
  uo[1]: "seg_b"
  uo[2]: "seg_c"
  uo[3]: "seg_d"
  uo[4]: "seg_e"
  uo[5]: "seg_f"
  uo[6]: "seg_g"
  uo[7]: "unused"

  # Bidirectional pins (Unused)
  uio[0]: ""
  uio[1]: ""
  uio[2]: ""
  uio[3]: ""
  uio[4]: ""
  uio[5]: ""
  uio[6]: ""
  uio[7]: ""

# Do not change!
yaml_version: 6
